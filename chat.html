<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HWP 보고서 작성 도우미</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: #1a73e8;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
      flex-shrink: 0;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header .subtitle { font-size: 13px; opacity: .8; }
    header .spacer { flex: 1; }
    #btn-new-session {
      background: rgba(255,255,255,.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,.4);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background .2s;
    }
    #btn-new-session:hover { background: rgba(255,255,255,.35); }

    /* Main layout */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ── Chat panel ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      width: 55%;
      min-width: 320px;
      background: #fff;
      border-right: 1px solid #dde1e7;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 85%;
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .msg.user .avatar { background: #1a73e8; color: #fff; }
    .msg.assistant .avatar { background: #e8eaf6; color: #3949ab; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .msg.user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .bubble {
      background: #f1f3f4;
      color: #202124;
      border-bottom-left-radius: 4px;
    }

    .typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 10px 14px;
      background: #f1f3f4;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .typing-indicator span {
      display: inline-block;
      width: 8px; height: 8px;
      background: #9aa0a6;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* HWPX download banner */
    .hwpx-banner {
      display: none;
      margin: 0 16px 8px;
      padding: 10px 14px;
      background: #e6f4ea;
      border: 1px solid #34a853;
      border-radius: 8px;
      font-size: 13px;
      color: #137333;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hwpx-banner.hidden { display: none !important; }
    .hwpx-banner a {
      color: #137333;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid #34a853;
      padding: 4px 10px;
      border-radius: 5px;
      margin-left: auto;
      transition: background .2s;
    }
    .hwpx-banner a:hover { background: #ceead6; }

    /* Input area */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: #fff;
    }
    #user-input {
      flex: 1;
      border: 1px solid #dde1e7;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color .2s;
    }
    #user-input:focus { border-color: #1a73e8; }
    #btn-send {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #1a73e8;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .2s;
    }
    #btn-send:hover { background: #1558b0; }
    #btn-send:disabled { background: #bdc1c6; cursor: default; }

    /* ── Preview panel ── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fafafa;
      overflow: hidden;
    }

    .preview-header {
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #dde1e7;
      font-size: 13px;
      color: #5f6368;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .preview-header .doc-title {
      color: #202124;
      margin-left: 4px;
    }

    .preview-content {
      flex: 1;
      overflow: hidden;
      padding: 12px;
    }
    #preview-frame {
      width: 100%;
      height: 100%;
      border: 1px solid #dde1e7;
      border-radius: 6px;
      background: #fff;
    }

    .preview-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #9aa0a6;
      font-size: 14px;
      gap: 12px;
    }
    .preview-empty .icon { font-size: 48px; }

    /* Responsive */
    @media (max-width: 768px) {
      .main { flex-direction: column; }
      .chat-panel { width: 100%; height: 60vh; border-right: none; border-bottom: 1px solid #dde1e7; }
      .preview-panel { height: 40vh; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>📝 HWP 보고서 작성 도우미</h1>
    <div class="subtitle">Claude AI와 대화하여 HWPX 보고서를 자동으로 작성합니다</div>
  </div>
  <div class="spacer"></div>
  <button id="btn-new-session">+ 새 보고서</button>
</header>

<div class="main">

  <!-- Chat panel -->
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="msg assistant">
        <div class="avatar">🤖</div>
        <div class="bubble">안녕하세요! HWPX 보고서 작성을 도와드리겠습니다.

어떤 보고서를 작성하고 싶으신가요? 예를 들어 다음과 같이 말씀해 주세요:

• "AI 교육 지원 사업 보고서 작성해줘"
• "스마트시티 추진 계획 보고서 만들어줘"
• "신재생에너지 도입 방안 보고서 작성 부탁해"</div>
      </div>
    </div>

    <div class="typing-indicator" id="typing">
      <span></span><span></span><span></span>
    </div>

    <div class="hwpx-banner hidden" id="hwpx-banner">
      ✅ HWPX 파일이 생성되었습니다!
      <a id="hwpx-link" href="#" download>다운로드</a>
    </div>

    <div class="input-area">
      <textarea
        id="user-input"
        placeholder="메시지를 입력하세요... (Shift+Enter: 줄바꿈, Enter: 전송)"
        rows="1"
      ></textarea>
      <button id="btn-send" title="전송">➤</button>
    </div>
  </div>

  <!-- Preview panel -->
  <div class="preview-panel">
    <div class="preview-header">
      📄 문서 미리보기
      <span class="doc-title" id="preview-doc-title"></span>
    </div>
    <div class="preview-content">
      <div class="preview-empty" id="preview-empty">
        <div class="icon">📋</div>
        <div>대화를 시작하면 문서 미리보기가 여기에 표시됩니다</div>
      </div>
      <iframe id="preview-frame" style="display:none;" title="문서 미리보기"></iframe>
    </div>
  </div>

</div>

<script>
  const API = 'http://127.0.0.1:8000';
  let sessionId = localStorage.getItem('hwp_session_id') || crypto.randomUUID();
  localStorage.setItem('hwp_session_id', sessionId);

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('btn-send');
  const typingEl = document.getElementById('typing');
  const hwpxBanner = document.getElementById('hwpx-banner');
  const hwpxLink = document.getElementById('hwpx-link');
  const previewFrame = document.getElementById('preview-frame');
  const previewEmpty = document.getElementById('preview-empty');
  const previewDocTitle = document.getElementById('preview-doc-title');

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // ── Enter to send ─────────────────────────────────────────────────────────
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);
  document.getElementById('btn-new-session').addEventListener('click', newSession);

  // ── Helpers ───────────────────────────────────────────────────────────────
  function appendMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
      <div class="bubble">${escapeHtml(text)}</div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function setLoading(loading) {
    sendBtn.disabled = loading;
    inputEl.disabled = loading;
    typingEl.style.display = loading ? 'flex' : 'none';
    if (loading) messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function updatePreview(docJson) {
    if (!docJson) return;

    previewDocTitle.textContent = '— ' + (docJson.title || '');

    try {
      const resp = await fetch(`${API}/preview`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(docJson),
      });
      if (!resp.ok) return;
      const html = await resp.text();

      // Inject into iframe via srcdoc
      previewEmpty.style.display = 'none';
      previewFrame.style.display = 'block';
      previewFrame.srcdoc = html;
    } catch (err) {
      console.warn('Preview failed:', err);
    }
  }

  function showHwpxBanner(url) {
    hwpxBanner.classList.remove('hidden');
    hwpxLink.href = API + url;
    hwpxLink.setAttribute('download', url.split('/').pop());
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Send message ──────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    appendMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    setLoading(true);

    try {
      const resp = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });

      const data = await resp.json();

      if (data.error) {
        appendMessage('assistant', '오류가 발생했습니다: ' + data.error);
      } else {
        appendMessage('assistant', data.reply || '(응답 없음)');

        if (data.document_json) {
          updatePreview(data.document_json);
        }

        if (data.hwpx_url) {
          showHwpxBanner(data.hwpx_url);
        }
      }
    } catch (err) {
      appendMessage('assistant', '서버 연결에 실패했습니다. 서버가 실행 중인지 확인해 주세요.');
      console.error(err);
    } finally {
      setLoading(false);
      inputEl.focus();
    }
  }

  // ── New session ───────────────────────────────────────────────────────────
  async function newSession() {
    if (!confirm('새 보고서를 시작하면 현재 대화 내용이 초기화됩니다. 계속하시겠습니까?')) return;

    // Reset server session
    await fetch(`${API}/chat/reset`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId }),
    }).catch(() => {});

    // New session ID
    sessionId = crypto.randomUUID();
    localStorage.setItem('hwp_session_id', sessionId);

    // Reset UI
    messagesEl.innerHTML = `
      <div class="msg assistant">
        <div class="avatar">🤖</div>
        <div class="bubble">새 보고서 작성을 시작합니다. 어떤 보고서를 작성하고 싶으신가요?</div>
      </div>`;

    hwpxBanner.classList.add('hidden');
    previewFrame.style.display = 'none';
    previewFrame.srcdoc = '';
    previewEmpty.style.display = 'flex';
    previewDocTitle.textContent = '';
    inputEl.focus();
  }
</script>
</body>
</html>
