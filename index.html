<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>문서 미리보기</title>

<style>
body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: Arial, sans-serif;
}

.left {
    width: 40%;
    padding: 10px;
    box-sizing: border-box;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.right {
    width: 60%;
    height: 100%;
}

.toolbar {
    display: flex;
    gap: 8px;
}

textarea {
    width: 100%;
    flex: 1;
    font-family: monospace;
    font-size: 14px;
    resize: none;
    box-sizing: border-box;
}

button {
    height: 40px;
    cursor: pointer;
}

.primary-btn {
    width: 100%;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

#errorBox {
    min-height: 24px;
    color: #c62828;
    font-size: 14px;
    white-space: pre-wrap;
}

.command-box {
    display: flex;
    gap: 8px;
}

.command-box input {
    flex: 1;
    height: 40px;
    padding: 0 10px;
    box-sizing: border-box;
    font-size: 14px;
}

.command-box button {
    width: 100px;
    height: 40px;
}
</style>
</head>

<body>

<div class="left">
    <div class="toolbar">
        <button type="button" onclick="loadSample()">샘플 불러오기</button>
        <button type="button" onclick="resetInput()">초기화</button>
    </div>

    <div class="command-box">
        <input id="commandInput" type="text" placeholder="명령 입력 (예: 제목을 업무 자동화 보고서로 바꿔)">
        <button type="button" onclick="runCommand()">명령 실행</button>
    </div>

    <textarea id="jsonInput"></textarea>

    <div id="errorBox"></div>

    <button class="primary-btn" type="button" onclick="preview()">미리보기</button>
    <button class="primary-btn" type="button" onclick="generateHwpx()">HWPX 생성 및 다운로드</button>
</div>

<div class="right">
    <iframe id="previewFrame"></iframe>
</div>

<script>
const sampleDoc = {
  "title": "문서 자동화 보고서",
  "blocks": [
    { "type": "heading", "level": 1, "text": "1. 개요" },
    { "type": "paragraph", "text": "이 보고서는 문서 자동화 방향을 검토하기 위해 작성되었다." },
    { "type": "bullet_list", "items": ["초안 자동 생성", "HTML 미리보기", "최종 HWPX 생성"] },
    {
      "type": "table",
      "headers": ["구분", "내용"],
      "rows": [
        ["목표", "문서 작성 자동화"],
        ["방식", "JSON 기반 렌더링"]
      ]
    }
  ]
};

function setError(message) {
    document.getElementById("errorBox").textContent = message || "";
}

function loadSample() {
    document.getElementById("jsonInput").value = JSON.stringify(sampleDoc, null, 2);
    setError("");
}

function resetInput() {
    document.getElementById("jsonInput").value = "";
    document.getElementById("previewFrame").srcdoc = "";
    setError("");
}

async function preview() {
    const input = document.getElementById("jsonInput").value;

    try {
        setError("");

        const json = JSON.parse(input);

        const res = await fetch("http://127.0.0.1:8000/preview", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(json)
        });

        if (!res.ok) {
            throw new Error(`서버 오류: ${res.status} ${res.statusText}`);
        }

        const html = await res.text();
        document.getElementById("previewFrame").srcdoc = html;

    } catch (e) {
        setError("오류: " + e.message);
    }
}

async function runCommand() {
    const command = document.getElementById("commandInput").value;
    const input = document.getElementById("jsonInput").value;

    try {
        setError("");

        const json = JSON.parse(input);

        const res = await fetch("http://127.0.0.1:8000/command", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                doc: json,
                command: command
            })
        });

        if (!res.ok) {
            throw new Error(`서버 오류: ${res.status} ${res.statusText}`);
        }

        const updated = await res.json();

        document.getElementById("jsonInput").value = JSON.stringify(updated, null, 2);

        // 명령 적용 후 자동 미리보기
        await preview();

    } catch (e) {
        setError("오류: " + e.message);
    }
}

async function generateHwpx() {
    const input = document.getElementById("jsonInput").value;

    try {
        setError("");

        const json = JSON.parse(input);

        const res = await fetch("http://127.0.0.1:8000/generate-hwpx", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(json)
        });

        if (!res.ok) {
            throw new Error(`서버 오류: ${res.status} ${res.statusText}`);
        }

        const result = await res.json();

        if (!result.download_url) {
            throw new Error("다운로드 URL을 받지 못했습니다.");
        }

        window.open(`http://127.0.0.1:8000${result.download_url}`, "_blank");

    } catch (e) {
        setError("오류: " + e.message);
    }
}

window.onload = loadSample;
</script>

</body>
</html>
